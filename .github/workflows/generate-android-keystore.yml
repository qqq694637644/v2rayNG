name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Android signing key alias'
        required: false
        default: 'v2rayng'
        type: string
      validity_days:
        description: 'Key validity in days'
        required: false
        default: '10000'
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  generate-keystore:
    name: Generate Android keystore artifact
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate keystore and secrets file
        env:
          KEY_ALIAS: ${{ inputs.alias }}
          VALIDITY_DAYS: ${{ inputs.validity_days }}
        run: |
          set -euo pipefail

          if [[ ! "$VALIDITY_DAYS" =~ ^[0-9]+$ ]]; then
            echo 'validity_days must be a positive integer.' >&2
            exit 1
          fi

          if [[ -z "$KEY_ALIAS" ]]; then
            echo 'alias must not be empty.' >&2
            exit 1
          fi

          output_dir="$RUNNER_TEMP/android-keystore"
          mkdir -p "$output_dir"

          keystore_file="$output_dir/android_keystore.jks"
          secrets_file="$output_dir/github-actions-secrets.txt"
          readme_file="$output_dir/README.txt"
          checksum_file="$output_dir/SHA256SUMS.txt"

          keystore_password="$(openssl rand -hex 32)"
          key_password="$(openssl rand -hex 32)"

          echo "::add-mask::$keystore_password"
          echo "::add-mask::$key_password"

          keytool -genkeypair \
            -v \
            -keystore "$keystore_file" \
            -storetype JKS \
            -storepass "$keystore_password" \
            -alias "$KEY_ALIAS" \
            -keypass "$key_password" \
            -keyalg RSA \
            -keysize 2048 \
            -validity "$VALIDITY_DAYS" \
            -dname 'CN=v2rayNG Release,O=v2rayNG,C=US'

          keystore_base64="$(base64 -w 0 "$keystore_file")"

          cat > "$secrets_file" <<EOF
          APP_KEYSTORE_BASE64=$keystore_base64
          APP_KEYSTORE_PASSWORD=$keystore_password
          APP_KEYSTORE_ALIAS=$KEY_ALIAS
          APP_KEY_PASSWORD=$key_password
          EOF

          cat > "$readme_file" <<EOF
          This artifact contains an Android signing keystore generated by GitHub Actions.

          Files:
          - android_keystore.jks: the Android signing keystore file. Keep it private.
          - github-actions-secrets.txt: values to copy into GitHub repository Actions secrets.
          - SHA256SUMS.txt: checksum file for this artifact content.

          Add these secrets in the v2rayNG repository:
          Settings -> Secrets and variables -> Actions -> New repository secret

          Required secrets:
          - APP_KEYSTORE_BASE64
          - APP_KEYSTORE_PASSWORD
          - APP_KEYSTORE_ALIAS
          - APP_KEY_PASSWORD

          Keep this artifact private. Anyone who has the keystore and passwords can sign APKs as this app.
          EOF

          (
            cd "$output_dir"
            sha256sum android_keystore.jks github-actions-secrets.txt README.txt > SHA256SUMS.txt
          )

          echo 'Generated android_keystore.jks and github-actions-secrets.txt.'
          echo 'Download the android-keystore artifact and copy values from github-actions-secrets.txt into repository Actions secrets.'

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-keystore-${{ github.run_id }}
          path: ${{ runner.temp }}/android-keystore/*
          retention-days: 1
          if-no-files-found: error
