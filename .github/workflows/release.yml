name: Release APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.0.0 or test'
        required: true
        type: string
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: false
        default: false
        type: boolean
      android_libxraylite_tag:
        description: 'AndroidLibXrayLite release tag to download libv2ray.aar from'
        required: false
        default: 'v26.3.27-v2rayng-r2'
        type: string
      android_libxraylite_repository:
        description: 'Repository to download libv2ray.aar from'
        required: false
        default: 'qqq694637644/AndroidLibXrayLite'
        type: string

permissions:
  contents: write

jobs:
  release-apk:
    name: Build and publish Android release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '14742923'
          packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

      - name: Install NDK
        shell: bash
        run: |
          set -euo pipefail
          echo 'y' | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            --channel=0 \
            --install 'ndk;29.0.14206865'
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          sed -i '10i\
              ndkVersion = "29.0.14206865"' "$GITHUB_WORKSPACE/V2rayNG/app/build.gradle.kts"

      - name: Restore cached libhevtun
        id: cache-libhevtun-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Build libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash compile-hevtun.sh

      - name: Save libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Copy libhevtun
        shell: bash
        run: |
          set -euo pipefail
          cp -r "$GITHUB_WORKSPACE/libs" "$GITHUB_WORKSPACE/V2rayNG/app"

      - name: Resolve AndroidLibXrayLite tag
        shell: bash
        env:
          REQUESTED_ANDROID_LIBXRAYLITE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.android_libxraylite_tag || '' }}
          REQUESTED_ANDROID_LIBXRAYLITE_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.android_libxraylite_repository || 'qqq694637644/AndroidLibXrayLite' }}
        run: |
          set -euo pipefail
          current_repository="${REQUESTED_ANDROID_LIBXRAYLITE_REPOSITORY:-qqq694637644/AndroidLibXrayLite}"
          if [[ -n "$REQUESTED_ANDROID_LIBXRAYLITE_TAG" ]]; then
            current_tag="$REQUESTED_ANDROID_LIBXRAYLITE_TAG"
            echo "Using requested AndroidLibXrayLite tag: $current_tag"
          else
            pushd AndroidLibXrayLite
            current_tag=$(git describe --tags --abbrev=0)
            echo "Using AndroidLibXrayLite submodule tag: $current_tag"
            popd
          fi
          echo "Using AndroidLibXrayLite repository: $current_repository"
          echo "CURRENT_REPOSITORY=$current_repository" >> "$GITHUB_ENV"
          echo "CURRENT_TAG=$current_tag" >> "$GITHUB_ENV"

      - name: Download libv2ray
        uses: robinraju/release-downloader@v1.13
        with:
          repository: ${{ env.CURRENT_REPOSITORY }}
          tag: ${{ env.CURRENT_TAG }}
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Prepare Android keystore
        id: android_keystore
        shell: bash
        env:
          APP_KEYSTORE_BASE64: ${{ secrets.APP_KEYSTORE_BASE64 }}
          APP_KEYSTORE_PASSWORD_SECRET: ${{ secrets.APP_KEYSTORE_PASSWORD }}
          APP_KEYSTORE_ALIAS_SECRET: ${{ secrets.APP_KEYSTORE_ALIAS }}
          APP_KEY_PASSWORD_SECRET: ${{ secrets.APP_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          keystore_file="$RUNNER_TEMP/android_keystore.jks"

          if [[ -n "${APP_KEYSTORE_BASE64:-}" \
             && -n "${APP_KEYSTORE_PASSWORD_SECRET:-}" \
             && -n "${APP_KEYSTORE_ALIAS_SECRET:-}" \
             && -n "${APP_KEY_PASSWORD_SECRET:-}" ]]; then
            echo 'Using Android signing keystore from repository secrets.'
            printf '%s' "$APP_KEYSTORE_BASE64" | base64 -d > "$keystore_file"
            keystore_password="$APP_KEYSTORE_PASSWORD_SECRET"
            key_alias="$APP_KEYSTORE_ALIAS_SECRET"
            key_password="$APP_KEY_PASSWORD_SECRET"
          else
            echo 'Android signing secrets are incomplete; generating a temporary runner-local keystore.'
            echo 'The generated APK cannot be used for in-place upgrades across releases. Uninstall the previous APK before installing this one.'
            keystore_password="$(openssl rand -hex 32)"
            key_alias='v2rayng-temp'
            key_password="$(openssl rand -hex 32)"
            keytool -genkeypair \
              -v \
              -keystore "$keystore_file" \
              -storetype JKS \
              -storepass "$keystore_password" \
              -alias "$key_alias" \
              -keypass "$key_password" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname 'CN=v2rayNG Temporary Release,O=v2rayNG,C=US'
          fi

          echo "::add-mask::$keystore_password"
          echo "::add-mask::$key_password"
          echo "keystore_file=$keystore_file" >> "$GITHUB_OUTPUT"
          echo "keystore_password=$keystore_password" >> "$GITHUB_OUTPUT"
          echo "key_alias=$key_alias" >> "$GITHUB_OUTPUT"
          echo "key_password=$key_password" >> "$GITHUB_OUTPUT"

      - name: Build signed APKs
        shell: bash
        env:
          APP_KEYSTORE_PASSWORD: ${{ steps.android_keystore.outputs.keystore_password }}
          APP_KEYSTORE_ALIAS: ${{ steps.android_keystore.outputs.key_alias }}
          APP_KEY_PASSWORD: ${{ steps.android_keystore.outputs.key_password }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/V2rayNG"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod 755 gradlew
          ./gradlew licenseFdroidReleaseReport
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file='${{ steps.android_keystore.outputs.keystore_file }}' \
            -Pandroid.injected.signing.store.password="$APP_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$APP_KEYSTORE_ALIAS" \
            -Pandroid.injected.signing.key.password="$APP_KEY_PASSWORD"

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find "$GITHUB_WORKSPACE/V2rayNG/app/build/outputs/apk" -type f -path '*/release/*.apk' -print -exec cp '{}' release-files/ \;
          test -n "$(find release-files -type f -name '*.apk' -print -quit)"
          (cd release-files && sha256sum *.apk > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            release-files/*
