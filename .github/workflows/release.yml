name: Release APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.0.0 or test'
        required: true
        type: string
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-apk:
    name: Build and publish Android release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '14742923'
          packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

      - name: Install NDK
        shell: bash
        run: |
          set -euo pipefail
          echo 'y' | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            --channel=0 \
            --install 'ndk;29.0.14206865'
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          sed -i '10i\
              ndkVersion = "29.0.14206865"' "$GITHUB_WORKSPACE/V2rayNG/app/build.gradle.kts"

      - name: Restore cached libhevtun
        id: cache-libhevtun-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Build libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash compile-hevtun.sh

      - name: Save libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Copy libhevtun
        shell: bash
        run: |
          set -euo pipefail
          cp -r "$GITHUB_WORKSPACE/libs" "$GITHUB_WORKSPACE/V2rayNG/app"

      - name: Fetch AndroidLibXrayLite tag
        shell: bash
        run: |
          set -euo pipefail
          pushd AndroidLibXrayLite
          current_tag=$(git describe --tags --abbrev=0)
          echo "CURRENT_TAG=$current_tag" >> "$GITHUB_ENV"
          popd

      - name: Download libv2ray
        uses: robinraju/release-downloader@v1.13
        with:
          repository: '2dust/AndroidLibXrayLite'
          tag: ${{ env.CURRENT_TAG }}
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Decode Android keystore
        uses: timheuer/base64-to-file@v2.0.0
        id: android_keystore
        with:
          fileName: android_keystore.jks
          encodedString: ${{ secrets.APP_KEYSTORE_BASE64 }}

      - name: Build signed APKs
        shell: bash
        env:
          APP_KEYSTORE_PASSWORD: ${{ secrets.APP_KEYSTORE_PASSWORD }}
          APP_KEYSTORE_ALIAS: ${{ secrets.APP_KEYSTORE_ALIAS }}
          APP_KEY_PASSWORD: ${{ secrets.APP_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/V2rayNG"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod 755 gradlew
          ./gradlew licenseFdroidReleaseReport
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file='${{ steps.android_keystore.outputs.filePath }}' \
            -Pandroid.injected.signing.store.password="$APP_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$APP_KEYSTORE_ALIAS" \
            -Pandroid.injected.signing.key.password="$APP_KEY_PASSWORD"

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find "$GITHUB_WORKSPACE/V2rayNG/app/build/outputs/apk" -type f -path '*/release/*.apk' -print -exec cp '{}' release-files/ \;
          test -n "$(find release-files -type f -name '*.apk' -print -quit)"
          (cd release-files && sha256sum *.apk > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            release-files/*
